name: CI/CD — Build & Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (Task folder)
        run: |
          cd Task
          npm ci

      - name: Build (Task folder)
        run: |
          cd Task
          npm run build

      - name: Install Vercel CLI
        run: |
          cd Task
          npm install -g vercel

      - name: Deploy to Vercel (Task folder)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd Task
          vercel --prod --confirm --token "$VERCEL_TOKEN"
